<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: transform .25s, box-shadow .25s;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 36px rgba(102, 126, 234, 0.25);
        }

        .card .value {
            font-size: 2.4rem;
            font-weight: 700;
            color: #667eea;
        }

        .card .label {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 0.3rem;
        }

        .chart-placeholder {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            color: #888;
            font-size: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 0.9rem 1.2rem;
            text-align: left;
        }

        th {
            background: rgba(102, 126, 234, 0.3);
            font-weight: 600;
            color: #fff;
        }

        tr:nth-child(even) { background: rgba(255, 255, 255, 0.04); }
        tr:hover { background: rgba(102, 126, 234, 0.12); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Sample Dashboard</h1>

        <div class="cards">
            <div class="card">
                <div class="value">1,284</div>
                <div class="label">Total Users</div>
            </div>
            <div class="card">
                <div class="value">$42.5K</div>
                <div class="label">Revenue</div>
            </div>
            <div class="card">
                <div class="value">96%</div>
                <div class="label">Uptime</div>
            </div>
            <div class="card">
                <div class="value">3.2s</div>
                <div class="label">Avg Response</div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Project</th>
                    <th>Status</th>
                    <th>Progress</th>
                    <th>Deadline</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Website Redesign</td>
                    <td style="color:#00c853">● Active</td>
                    <td>75%</td>
                    <td>May 15, 2026</td>
                </tr>
                <tr>
                    <td>Mobile App v2</td>
                    <td style="color:#ffab00">● In Review</td>
                    <td>90%</td>
                    <td>Apr 30, 2026</td>
                </tr>
                <tr>
                    <td>API Migration</td>
                    <td style="color:#667eea">● Planning</td>
                    <td>20%</td>
                    <td>Jun 01, 2026</td>
                </tr>
                <tr>
                    <td>Analytics Engine</td>
                    <td style="color:#00c853">● Active</td>
                    <td>55%</td>
                    <td>May 28, 2026</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
